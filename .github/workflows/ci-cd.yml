name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: daa-portal-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  APP_DIR: /home/ubuntu/daa-portal
  APP_IMAGE: daa-portal-app
  APP_CONTAINER: daa-portal
  APP_PORT: "3000"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "1"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

  deploy:
    name: Deploy to AWS EC2
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy app server over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.AWS_APP_HOST }}
          username: ${{ secrets.AWS_APP_USER }}
          key: ${{ secrets.AWS_APP_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            cd "${{ env.APP_DIR }}"

            echo "Pulling latest main branch..."
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            echo "Checking required production env file..."
            test -f .env.production

            echo "Verifying Piston is reachable from app server..."
            PISTON_API_URL="$(grep -E '^PISTON_API_URL=' .env.production | cut -d '=' -f2-)"
            test -n "$PISTON_API_URL"
            curl -fsS "${PISTON_API_URL%/}/runtimes" >/dev/null

            echo "Building Docker image..."
            sudo docker build \
              --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY='${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}' \
              -t "${{ env.APP_IMAGE }}:${{ github.sha }}" \
              -t "${{ env.APP_IMAGE }}:latest" \
              .

            echo "Replacing running container..."
            sudo docker rm -f "${{ env.APP_CONTAINER }}" >/dev/null 2>&1 || true
            sudo docker run -d \
              --name "${{ env.APP_CONTAINER }}" \
              --restart unless-stopped \
              -p "${{ env.APP_PORT }}:${{ env.APP_PORT }}" \
              --env-file .env.production \
              "${{ env.APP_IMAGE }}:${{ github.sha }}"

            echo "Waiting for health check..."
            for attempt in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:${{ env.APP_PORT }}/api/health" >/dev/null; then
                echo "Deployment successful."
                sudo docker image prune -f
                exit 0
              fi

              echo "App not healthy yet. Attempt ${attempt}/30..."
              sudo docker logs --tail 20 "${{ env.APP_CONTAINER }}" || true
              sleep 5
            done

            echo "Deployment failed: app did not become healthy."
            sudo docker ps -a
            sudo docker logs --tail 100 "${{ env.APP_CONTAINER }}" || true
            exit 1
